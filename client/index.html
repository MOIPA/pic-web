<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-brand">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>Photo Gallery</span>
    </div>
    <div class="nav-actions">
      <span class="image-count" id="imageCount">0 photos</span>
      <button class="btn-upload" id="uploadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>
    </div>
  </nav>

  <!-- Upload Area (hidden by default) -->
  <div class="upload-overlay" id="uploadOverlay">
    <div class="upload-modal">
      <button class="upload-close" id="uploadClose">&times;</button>
      <div class="upload-dropzone" id="dropzone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3>Drop images here</h3>
        <p>or click to select files</p>
        <p class="upload-hint">Supports JPG, PNG, GIF, WebP (max 50MB)</p>
        <input type="file" id="fileInput" multiple accept="image/*" hidden>
      </div>
      <div class="upload-progress" id="uploadProgress" style="display:none">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">Uploading...</p>
      </div>
    </div>
  </div>

  <!-- Drag overlay for whole page -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="80" height="80">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <h2>Drop to upload</h2>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="80" height="80">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <h2>No photos yet</h2>
    <p>Upload your first photos to get started</p>
    <button class="btn-upload" id="emptyUploadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Photos
    </button>
  </div>

  <!-- Waterfall Gallery -->
  <main class="gallery" id="gallery"></main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox-info" id="lightboxInfo">
      <span class="lightbox-filename" id="lightboxFilename"></span>
      <span class="lightbox-dimensions" id="lightboxDimensions"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
